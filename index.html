<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joke Teller</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
      integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <button id="button">Tell Me A Joke</button>
      <audio id="audio" controls hidden></audio>
    </div>

    <span id="volume" class="volume" title="Can't hear?"><i class="fas fa-volume-mute"></i></span>
    <span id="github" class="github" title="Browse code"><i class="fab fa-github"></i></span>

    <div id="volume-modal" class="modal volume-modal">
      <div class="modal-content">
        <div class="modal-header">
          <span>Can't hear?</span>
          <span id="volume-modal-close" class="close">&times</span>
        </div>

        <div class="modal-body">
          <span id="volume-modal-body-text" class="modal-body-text">
            If your device speakers are working fine, then to hear the joke, you'll need to:
            <ol>
              <li>Get an API Key from <a href="http://www.voicerss.org/personel/" target="_blank">here</a> (it's free)</li>
              <li>
                Enter it in the <b>key.js</b> file in the format <br />
                <span style="background-color: lightgray">const key = 'ABC123'</span>
              </li>
            </ol>
          </span>
        </div>
      </div>
    </div>

    <div id="joke-modal" class="modal joke-modal">
      <div class="modal-content joke-modal-content">
        <div class="modal-header">
          <span>Joke Teller</span>
        </div>

        <div id="timer-container" class="timer-container">
          <div id="timer" class="timer"></div>
        </div>

        <div class="modal-body">
          <div class="modal-body-container">
            <p id="joke-modal-body-text" class="modal-body-text"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- JQuery -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
      integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <!-- Script -->
    <script src="./key.js"></script>
    <script src="./voice.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
